name: CI

on:
  pull_request:
    paths:
      - "Sitio web/**"
      - ".github/workflows/ci.yml"
  push:
    branches: [main]
    paths:
      - "Sitio web/**"
      - ".github/workflows/ci.yml"

defaults:
  run:
    working-directory: "Sitio web"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: "Sitio web/package-lock.json"

      - run: npm ci
      - run: npm run build
      - run: npm audit --omit=dev --audit-level=high
